name: Deploy to DigitalOcean
run-name: Deploying to ${{ github.sha }}

on:
  push:
    branches:
      - main  # Trigger on push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          source: "."
          target: "/var/www/teer.club"
          rm: true
          
      - name: Install & Build on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            cd /var/www/teer.club
            
            # Backend Setup
            echo "Installing Backend Dependencies..."
            cd backend
            npm install
            
            # Frontend Setup
            echo "Installing and Building Frontend..."
            cd ../frontend
            npm install
            npm run build
            
            # Admin Panel Setup
            echo "Installing and Building Admin Panel..."
            cd ../admin-panel
            npm install
            npm run build
            
            # PM2 Keepalive
            echo "Starting/Restarting Apps via PM2..."
            cd /var/www/teer.club/backend
            pm2 delete api || true
            pm2 start index.js --name "api" --node-args="-r dotenv/config"
            
            cd /var/www/teer.club/frontend
            pm2 delete frontend || true
            pm2 start npm --name "frontend" -- run start -- -p 3000
            
            cd /var/www/teer.club/admin-panel
            pm2 delete admin-panel || true
            pm2 start npm --name "admin-panel" -- run start -- -p 3001
            
            pm2 save
            
            echo "Deployment Complete!"
