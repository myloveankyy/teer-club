name: Deploy to DigitalOcean
run-name: Deploying to ${{ github.sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ---- BUILD FRONTEND LOCALLY ON GITHUB RUNNER (7GB RAM) ----
      - name: Install & Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # ---- BUILD ADMIN PANEL LOCALLY ON GITHUB RUNNER ----
      - name: Install & Build Admin Panel
        working-directory: ./admin-panel
        run: |
          npm install
          npm run build

      # ---- COPY ENTIRE PROJECT (with pre-built .next) TO SERVER ----
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          source: "."
          target: "/var/www/teer.club"
          rm: false

      # ---- SERVER-SIDE: Install runtime deps & restart PM2 ----
      - name: Install Dependencies & Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            set -e
            cd /var/www/teer.club

            # Recreate Backend .env file
            echo "Recreating environment variables..."
            echo "DB_USER=neondb_owner" > backend/.env
            echo "DB_HOST=ep-bitter-brook-aivyz964-pooler.c-4.us-east-1.aws.neon.tech" >> backend/.env
            echo "DB_NAME=neondb" >> backend/.env
            echo "DB_PASSWORD=npg_S5ptrxHMKhu9" >> backend/.env
            echo "DB_PORT=5432" >> backend/.env
            echo "DB_SSL=true" >> backend/.env
            echo "JWT_SECRET=super_secret_teer_club_jwt_key_2026" >> backend/.env
            echo "GA4_PROPERTY_ID=469586125" >> backend/.env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> backend/.env

            # Backend: install runtime deps only
            echo "Installing Backend Dependencies..."
            cd backend
            npm install --omit=dev

            # Frontend: install production deps for standalone server
            echo "Installing Frontend Production Dependencies..."
            cd ../frontend
            npm install --omit=dev

            # Admin Panel: install production deps
            echo "Installing Admin Panel Production Dependencies..."
            cd ../admin-panel
            npm install --omit=dev

            # PM2 Keepalive
            echo "Starting/Restarting Apps via PM2..."
            cd /var/www/teer.club/backend
            pm2 delete api || true
            pm2 start index.js --name "api" --node-args="-r dotenv/config"

            cd /var/www/teer.club/frontend
            pm2 delete frontend || true
            pm2 start npm --name "frontend" -- run start -- -p 3000

            cd /var/www/teer.club/admin-panel
            pm2 delete admin-panel || true
            pm2 start npm --name "admin-panel" -- run start -- -p 3001

            pm2 save

            echo "Deployment Complete!"
